<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Web Scraper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .bg-fallback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 80%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(255, 0, 170, 0.1) 0%, transparent 60%),
                        #000;
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0 40px;
            perspective: 1000px;
        }

        .logo-3d {
            display: inline-block;
            animation: float 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-20px) rotateX(5deg); }
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00f5ff, #7c3aed, #ff00aa);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            text-shadow: 0 0 60px rgba(0, 245, 255, 0.5);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 0 80px rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: rgba(0, 245, 255, 0.3);
            box-shadow: 0 15px 50px rgba(0, 245, 255, 0.15),
                        inset 0 0 80px rgba(255, 255, 255, 0.03);
        }

        .search-box {
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .search-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 245, 255, 0.1), transparent 30%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .search-box-inner {
            position: relative;
            z-index: 1;
        }

        .input-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .url-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: all 0.4s;
        }

        .url-input:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3),
                        0 0 60px rgba(0, 245, 255, 0.1);
        }

        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .pages-wrapper {
            position: relative;
        }

        .pages-input {
            width: 80px;
            padding: 20px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            transition: all 0.4s;
        }

        .pages-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
        }

        .scrape-btn {
            padding: 20px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .scrape-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .scrape-btn:hover::before {
            left: 100%;
        }

        .scrape-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 245, 255, 0.4),
                        0 0 80px rgba(124, 58, 237, 0.3);
        }

        .scrape-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loader-3d {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            perspective: 800px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 3s infinite linear;
        }

        @keyframes rotateCube {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 245, 255, 0.5);
            background: rgba(0, 245, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .cube-face:nth-child(1) { transform: rotateY(0deg) translateZ(50px); }
        .cube-face:nth-child(2) { transform: rotateY(90deg) translateZ(50px); }
        .cube-face:nth-child(3) { transform: rotateY(180deg) translateZ(50px); }
        .cube-face:nth-child(4) { transform: rotateY(-90deg) translateZ(50px); }
        .cube-face:nth-child(5) { transform: rotateX(90deg) translateZ(50px); }
        .cube-face:nth-child(6) { transform: rotateX(-90deg) translateZ(50px); }

        .loading-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 500px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .stat-card {
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .stat-card:hover {
            transform: translateZ(20px) rotateX(5deg);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00f5ff, #7c3aed);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card p {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-section {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-3px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
        }

        .tab-content {
            display: none;
            padding: 30px;
            max-height: 700px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .article-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .article-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00f5ff, #7c3aed);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .article-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(10px);
            border-color: rgba(0, 245, 255, 0.2);
        }

        .article-card:hover::before {
            opacity: 1;
        }

        .article-title {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #00f5ff;
        }

        .article-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .article-title a:hover {
            color: #7c3aed;
        }

        .article-desc {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .article-meta {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 245, 255, 0.2);
            transform: translateX(5px);
        }

        .link-item a {
            color: #00f5ff;
            text-decoration: none;
            word-break: break-all;
            transition: color 0.3s;
        }

        .link-item a:hover {
            color: #7c3aed;
        }

        .link-text {
            color: #fff;
            margin-right: 15px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
            transform-style: preserve-3d;
        }

        .image-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            border-color: rgba(0, 245, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .image-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .image-card:hover img {
            transform: scale(1.1);
        }

        .image-card .image-info {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .image-card .image-alt {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            word-break: break-word;
        }

        .error-message {
            background: rgba(255, 0, 100, 0.1);
            border: 1px solid rgba(255, 0, 100, 0.3);
            border-radius: 16px;
            padding: 25px;
            color: #ff6b9d;
            text-align: center;
            display: none;
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .no-data {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 60px;
            font-size: 1.1rem;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00f5ff, #7c3aed);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="bg-fallback"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <header>
            <div class="logo-3d">
                <h1>Intelligent Web Scraper</h1>
            </div>
            <p>Extract articles, links, and images from any website</p>
        </header>

        <div class="search-box glass-card">
            <div class="search-box-inner">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" class="url-input" id="urlInput" placeholder="Enter website URL (e.g., https://www.bbc.com/news)">
                    </div>
                    <div class="pages-wrapper">
                        <input type="number" class="pages-input" id="pagesInput" value="1" min="1" max="10" title="Pages">
                    </div>
                    <button class="scrape-btn" id="scrapeBtn" onclick="startScraping()">Launch Scraper</button>
                </div>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading" id="loading">
            <div class="loader-3d">
                <div class="cube">
                    <div class="cube-face">S</div>
                    <div class="cube-face">C</div>
                    <div class="cube-face">R</div>
                    <div class="cube-face">A</div>
                    <div class="cube-face">P</div>
                    <div class="cube-face">E</div>
                </div>
            </div>
            <p class="loading-text">Extracting data from website...</p>
        </div>

        <div class="results-section" id="results">
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-icon">📄</div>
                    <h3 id="statPages">0</h3>
                    <p>Pages Scraped</p>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">📰</div>
                    <h3 id="statArticles">0</h3>
                    <p>Articles Found</p>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">🔗</div>
                    <h3 id="statLinks">0</h3>
                    <p>Links Found</p>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">🖼️</div>
                    <h3 id="statImages">0</h3>
                    <p>Images Found</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('articles')">Articles</button>
                <button class="tab-btn" onclick="showTab('links')">Links</button>
                <button class="tab-btn" onclick="showTab('images')">Images</button>
            </div>

            <div class="glass-card">
                <div class="tab-content active" id="articles-tab"></div>
                <div class="tab-content" id="links-tab"></div>
                <div class="tab-content" id="images-tab"></div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, particles;

        function init3DBackground() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const geometry = new THREE.BufferGeometry();
            const count = 2000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 100;
                positions[i + 1] = (Math.random() - 0.5) * 100;
                positions[i + 2] = (Math.random() - 0.5) * 100;

                const colorChoice = Math.random();
                if (colorChoice < 0.33) {
                    colors[i] = 0;
                    colors[i + 1] = 0.96;
                    colors[i + 2] = 1;
                } else if (colorChoice < 0.66) {
                    colors[i] = 0.49;
                    colors[i + 1] = 0.23;
                    colors[i + 2] = 0.93;
                } else {
                    colors[i] = 1;
                    colors[i + 1] = 0;
                    colors[i + 2] = 0.67;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const cubeGeometry = new THREE.BoxGeometry(2, 2, 2);
            const edges = new THREE.EdgesGeometry(cubeGeometry);
            
            for (let i = 0; i < 15; i++) {
                const lineMaterial = new THREE.LineBasicMaterial({ 
                    color: Math.random() > 0.5 ? 0x00f5ff : 0x7c3aed,
                    transparent: true,
                    opacity: 0.3
                });
                const cube = new THREE.LineSegments(edges, lineMaterial);
                cube.position.set(
                    (Math.random() - 0.5) * 80,
                    (Math.random() - 0.5) * 80,
                    (Math.random() - 0.5) * 80
                );
                cube.userData = {
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.02,
                        y: (Math.random() - 0.5) * 0.02
                    }
                };
                scene.add(cube);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            particles.rotation.x += 0.0003;
            particles.rotation.y += 0.0005;

            scene.children.forEach(child => {
                if (child.userData && child.userData.rotationSpeed) {
                    child.rotation.x += child.userData.rotationSpeed.x;
                    child.rotation.y += child.userData.rotationSpeed.y;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 0.5;
            const y = (e.clientY / window.innerHeight - 0.5) * 0.5;
            if (particles) {
                particles.rotation.x += y * 0.01;
                particles.rotation.y += x * 0.01;
            }
        });

        init3DBackground();

        async function startScraping() {
            const url = document.getElementById('urlInput').value.trim();
            const pages = parseInt(document.getElementById('pagesInput').value) || 1;

            if (!url) {
                showError('Please enter a website URL');
                return;
            }

            document.getElementById('scrapeBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, pages })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to scrape website');
                }

                displayResults(data);

            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('scrapeBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function displayResults(data) {
            animateNumber('statPages', data.stats.pages_scraped);
            animateNumber('statArticles', data.stats.total_articles);
            animateNumber('statLinks', data.stats.total_links);
            animateNumber('statImages', data.stats.total_images);

            displayArticles(data.articles);
            displayLinks(data.links);
            displayImages(data.images);

            document.getElementById('results').style.display = 'block';
            showTab('articles');
        }

        function animateNumber(elementId, target) {
            const element = document.getElementById(elementId);
            let current = 0;
            const increment = Math.ceil(target / 30);
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = current;
            }, 30);
        }

        function displayArticles(articles) {
            const container = document.getElementById('articles-tab');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="no-data">No articles found on this page</div>';
                return;
            }

            container.innerHTML = articles.map(article => `
                <div class="article-card">
                    <h3 class="article-title">
                        ${article.link ? `<a href="${article.link}" target="_blank">${article.title}</a>` : article.title}
                    </h3>
                    ${article.description ? `<p class="article-desc">${article.description}</p>` : ''}
                    <div class="article-meta">
                        ${article.date ? `<span>📅 ${article.date}</span>` : ''}
                        ${article.image ? `<span>🖼️ Has image</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function displayLinks(links) {
            const container = document.getElementById('links-tab');
            
            if (!links || links.length === 0) {
                container.innerHTML = '<div class="no-data">No links found on this page</div>';
                return;
            }

            container.innerHTML = links.map(link => `
                <div class="link-item">
                    ${link.text ? `<span class="link-text">${link.text.substring(0, 40)}${link.text.length > 40 ? '...' : ''}</span>` : ''}
                    <a href="${link.url}" target="_blank">${link.url}</a>
                </div>
            `).join('');
        }

        function displayImages(images) {
            const container = document.getElementById('images-tab');
            
            if (!images || images.length === 0) {
                container.innerHTML = '<div class="no-data">No images found on this page</div>';
                return;
            }

            container.innerHTML = `<div class="image-grid">
                ${images.map(img => `
                    <div class="image-card">
                        <img src="${img.src}" alt="${img.alt || 'Image'}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22160%22><rect fill=%22%23111%22 width=%22220%22 height=%22160%22/><text fill=%22%23666%22 x=%22110%22 y=%2280%22 text-anchor=%22middle%22 font-size=%2212%22>Image unavailable</text></svg>'">
                        <div class="image-info">
                            <p class="image-alt">${img.alt || 'No description'}</p>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === tabName) {
                    btn.classList.add('active');
                }
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startScraping();
            }
        });
    </script>
</body>
</html>
