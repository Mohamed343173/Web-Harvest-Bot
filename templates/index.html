<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Web Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            min-width: 300px;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transition: all 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .url-input::placeholder {
            color: #64748b;
        }

        .pages-input {
            width: 100px;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-align: center;
        }

        .pages-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .scrape-btn {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .scrape-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .scrape-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card h3 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card p {
            color: #94a3b8;
            margin-top: 5px;
        }

        .results-section {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            border-color: transparent;
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 600px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .article-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .article-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .article-title a {
            color: inherit;
            text-decoration: none;
        }

        .article-title a:hover {
            text-decoration: underline;
        }

        .article-desc {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .article-meta {
            font-size: 0.85rem;
            color: #64748b;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .link-item a {
            color: #00d4ff;
            text-decoration: none;
            word-break: break-all;
        }

        .link-item a:hover {
            text-decoration: underline;
        }

        .link-text {
            color: #fff;
            margin-right: 10px;
            font-weight: 500;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .image-card .image-info {
            padding: 12px;
        }

        .image-card .image-alt {
            font-size: 0.85rem;
            color: #94a3b8;
            word-break: break-word;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 20px;
            color: #fca5a5;
            text-align: center;
            display: none;
        }

        .no-data {
            text-align: center;
            color: #64748b;
            padding: 40px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Intelligent Web Scraper</h1>
            <p>Extract articles, links, and images from any website</p>
        </header>

        <div class="search-box">
            <div class="input-group">
                <input type="text" class="url-input" id="urlInput" placeholder="Enter website URL (e.g., https://www.bbc.com/news)">
                <input type="number" class="pages-input" id="pagesInput" value="1" min="1" max="10" title="Number of pages to scrape">
                <button class="scrape-btn" id="scrapeBtn" onclick="startScraping()">Start Scraping</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Scraping website... Please wait</p>
        </div>

        <div class="results-section" id="results">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3 id="statPages">0</h3>
                    <p>Pages Scraped</p>
                </div>
                <div class="stat-card">
                    <h3 id="statArticles">0</h3>
                    <p>Articles Found</p>
                </div>
                <div class="stat-card">
                    <h3 id="statLinks">0</h3>
                    <p>Links Found</p>
                </div>
                <div class="stat-card">
                    <h3 id="statImages">0</h3>
                    <p>Images Found</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('articles')">Articles</button>
                <button class="tab-btn" onclick="showTab('links')">Links</button>
                <button class="tab-btn" onclick="showTab('images')">Images</button>
            </div>

            <div class="tab-content active" id="articles-tab"></div>
            <div class="tab-content" id="links-tab"></div>
            <div class="tab-content" id="images-tab"></div>
        </div>
    </div>

    <script>
        async function startScraping() {
            const url = document.getElementById('urlInput').value.trim();
            const pages = parseInt(document.getElementById('pagesInput').value) || 1;

            if (!url) {
                showError('Please enter a website URL');
                return;
            }

            document.getElementById('scrapeBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url, pages })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to scrape website');
                }

                displayResults(data);

            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('scrapeBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function displayResults(data) {
            document.getElementById('statPages').textContent = data.stats.pages_scraped;
            document.getElementById('statArticles').textContent = data.stats.total_articles;
            document.getElementById('statLinks').textContent = data.stats.total_links;
            document.getElementById('statImages').textContent = data.stats.total_images;

            displayArticles(data.articles);
            displayLinks(data.links);
            displayImages(data.images);

            document.getElementById('results').style.display = 'block';
            showTab('articles');
        }

        function displayArticles(articles) {
            const container = document.getElementById('articles-tab');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="no-data">No articles found</div>';
                return;
            }

            container.innerHTML = articles.map(article => `
                <div class="article-card">
                    <h3 class="article-title">
                        ${article.link ? `<a href="${article.link}" target="_blank">${article.title}</a>` : article.title}
                    </h3>
                    ${article.description ? `<p class="article-desc">${article.description}</p>` : ''}
                    <div class="article-meta">
                        ${article.date ? `Date: ${article.date}` : ''}
                        ${article.image ? ` | Has image` : ''}
                    </div>
                </div>
            `).join('');
        }

        function displayLinks(links) {
            const container = document.getElementById('links-tab');
            
            if (!links || links.length === 0) {
                container.innerHTML = '<div class="no-data">No links found</div>';
                return;
            }

            container.innerHTML = links.map(link => `
                <div class="link-item">
                    ${link.text ? `<span class="link-text">${link.text.substring(0, 50)}${link.text.length > 50 ? '...' : ''}</span>` : ''}
                    <a href="${link.url}" target="_blank">${link.url}</a>
                </div>
            `).join('');
        }

        function displayImages(images) {
            const container = document.getElementById('images-tab');
            
            if (!images || images.length === 0) {
                container.innerHTML = '<div class="no-data">No images found</div>';
                return;
            }

            container.innerHTML = `<div class="image-grid">
                ${images.map(img => `
                    <div class="image-card">
                        <img src="${img.src}" alt="${img.alt || 'Image'}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22><rect fill=%22%23374151%22 width=%22200%22 height=%22150%22/><text fill=%22%239ca3af%22 x=%22100%22 y=%2275%22 text-anchor=%22middle%22>Image not available</text></svg>'">
                        <div class="image-info">
                            <p class="image-alt">${img.alt || 'No description'}</p>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === tabName) {
                    btn.classList.add('active');
                }
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startScraping();
            }
        });
    </script>
</body>
</html>
